<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shade of Design — Brand System v0.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tab-panel { animation: fadeIn 240ms ease both; }
  </style>
</head>
<body>
  <div style="background:var(--ocean-900,#0B1F33);color:rgba(255,255,255,0.85);font-family:'Space Grotesk',system-ui,sans-serif;font-size:13px;line-height:1.5;padding:10px 24px;letter-spacing:0.01em;border-bottom:1px solid rgba(255,255,255,0.08);">
    <span style="font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ember,#C97B4A);margin-right:8px;">Dark is canonical.</span>
    This system renders dark by default. Light activates via <code style="font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:3px;">prefers-color-scheme:&nbsp;light</code> or the Theme toggle in the Tweaks panel. Design and review dark-first.
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
